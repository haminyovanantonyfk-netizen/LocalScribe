name: Close Stale Issues
on:
  schedule:
    - cron: '0 0 * * *'
jobs:
  close-issues:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v5
        with:
          stale-issue-message: 'This issue is stale'
          stale-pr-message: 'This PR is stale'
          days-before-stale: 30
          days-before-close: 7